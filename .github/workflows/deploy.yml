name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_KNOWN_HOST: ${{ secrets.DEPLOY_KNOWN_HOST }}
          SSH_HOST: 145.14.153.1
          SSH_USER: u550675304
          SSH_PORT: 65002
          REMOTE_PATH: ~/domains/kova.md/public_html/
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOST" > ~/.ssh/known_hosts
          rsync -az --delete \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='wiki/' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_PATH"
