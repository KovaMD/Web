name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: 145.14.153.1
          SSH_USER: u550675304.kova.md
          # Hostinger uses port 65002 — change if your host uses 22
          SSH_PORT: 65002
          # Confirm this path with: run `pwd` after SSH-ing in
          REMOTE_PATH: ~/domains/kova.md/public_html/
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_PATH"
